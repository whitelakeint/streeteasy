<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #f5f5f5;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #0041D9;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    button:hover { background: #0035b3; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }
    #log {
      margin-top: 10px;
      padding: 8px;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 11px;
      border-radius: 6px;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>StreetEasy Scraper</h2>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
  </div>
  <button id="btnConnect">Connect</button>
  <button id="btnDisconnect" class="danger">Disconnect</button>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
