<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #0F172A;
    }
    h2 { margin: 0 0 12px; font-size: 15px; font-weight: 600; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #F1F5F9;
      font-size: 12px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot.on  { background: #22C55E; }
    .dot.off { background: #EF4444; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #64748B;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 9px;
      font-size: 12px;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    input[type="text"]:focus { outline: 2px solid #2563EB33; border-color: #2563EB; }

    .row { margin-bottom: 10px; }
    .actions { display: flex; gap: 6px; margin-top: 8px; }
    button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 6px;
      background: #2563EB;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1D4ED8; }
    button.ghost { background: #F1F5F9; color: #334155; }
    button.ghost:hover { background: #E2E8F0; }
    button.danger { background: #EF4444; }
    button.danger:hover { background: #DC2626; }

    #log {
      margin-top: 10px;
      padding: 6px 8px;
      background: #0F172A;
      color: #CBD5E1;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 10.5px;
      border-radius: 6px;
      max-height: 90px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .saved-note { color: #16A34A; font-size: 11px; margin-left: 4px; opacity: 0; transition: opacity 0.3s; }
    .saved-note.show { opacity: 1; }
  </style>
</head>
<body>
  <h2>StreetEasy Scraper</h2>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
  </div>

  <div class="row">
    <label for="wsUrl">
      WebSocket server URL
      <span id="savedNote" class="saved-note">· saved</span>
    </label>
    <input type="text" id="wsUrl" placeholder="ws://localhost:8765" spellcheck="false">
  </div>

  <div class="actions">
    <button id="btnSave">Save &amp; reconnect</button>
    <button id="btnReset" class="ghost" title="Reset to default">Default</button>
  </div>

  <div class="actions" style="margin-top:6px">
    <button id="btnConnect" class="ghost">Connect</button>
    <button id="btnDisconnect" class="danger">Disconnect</button>
  </div>

  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
